name: Sentill Market Data Scraper

on:
  schedule:
    # 03:00 UTC = 06:00 EAT (UTC+3) — before NSE opens at 09:00 EAT
    - cron: "0 3 * * 1-5"
  workflow_dispatch:   # Allow manual trigger from GitHub UI
  push:
    paths:
      - "scripts/scrape_yields.py"

permissions:
  contents: write      # Needed to commit market_data.json back to repo

jobs:
  scrape:
    name: Scrape & Commit Market Data
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Scraper
        run: python scripts/scrape_yields.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Validate Output
        run: |
          python - <<'EOF'
          import json, sys
          try:
              with open("public/market_data.json") as f:
                  d = json.load(f)
              assert len(d.get("mmfs", [])) >= 5,  "Not enough MMF records"
              assert len(d.get("tbills", [])) >= 2, "Not enough T-Bill records"
              assert d.get("macro", {}).get("cbk_rate"), "Missing CBK rate"
              print(f"✅ Validation passed — {len(d['mmfs'])} MMFs, {len(d['tbills'])} T-Bills")
          except Exception as e:
              print(f"❌ Validation failed: {e}")
              sys.exit(1)
          EOF

      - name: Commit market_data.json
        run: |
          git config --global user.name  "Sentill Scraper Bot"
          git config --global user.email "bot@sentill.africa"
          git add public/market_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update market_data.json [$TIMESTAMP]"
            git push
          fi

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::warning::Market data scraper failed. Fallback data remains active."
